# Full MATLAB example config — all fields populated
package:
  name: matlab
  version: "2025a"
  release: "1"
  arch: x86_64
  license: Proprietary
  maintainer: "HPC Team <lolno@tamu.edu>"
  description: "MATLAB R2025a - Technical Computing Environment"
  url: https://www.mathworks.com/products/matlab.html
  vendor: MathWorks

  dependencies:
    requires:
      - ca-certificates
    requires_rpm: []
    requires_deb:
      - libatomic1
    conflicts: []
    provides:
      - "matlab = 2025a"
    replaces: []

content:
  defaults:
    user: root
    group: root
    file_mode: "0644"
    dir_mode: "0755"

  files:
    - src: "/home/mjmjelde/matlab-staging/opt/matlab/2025b"
      dst: /opt/matlab/R2025a/

    # - src: matlab.desktop
    #   dst: /usr/share/applications/matlab-2025a.desktop
    #   mode: "0644"

    # - src: matlab.sh
    #   dst: /etc/profile.d/matlab-2025a.sh
    #   type: config

  symlinks: []

  alternatives:
    - name: matlab
      link: /usr/bin/matlab
      path: /opt/matlab/R2025a/bin/matlab
      priority: 2025
      followers:
        - name: mex
          link: /usr/bin/mex
          path: /opt/matlab/R2025a/bin/mex
        - name: matlab-help
          link: /usr/bin/matlab-help
          path: /opt/matlab/R2025a/bin/matlab-help

  directories:
    - path: /var/log/matlab
      mode: "0750"
      user: root
      group: matlab

scripts:
  # pre_install: scripts/preinst.sh
  # post_install: scripts/postinst.sh
  # pre_remove: scripts/prerm.sh
  # post_remove: scripts/postrm.sh

compression:
  algorithm: zstd
  level: 19
  threads: 0

splitting:
  enabled: true
  strategy: auto

rpm:
  group: Development/Tools
  payload_format: cpio

deb:
  section: science
  priority: optional
  fields:
    Bugs: https://hpc.tamu.edu/bugs
